naftiko: 1.0.0-alpha2
info:
  label: Nacos Open API — Namespace
  description: 'Nacos Open API — Namespace. 4 operations. Lead operation: List namespaces. Self-contained Naftiko capability
    covering one Nacos business surface.'
  tags:
  - Nacos
  - Namespace
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NACOS_API_KEY: NACOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-namespace
    baseUri: http://localhost:8848/nacos
    description: Nacos Open API — Namespace business capability. Self-contained, no shared references.
    resources:
    - name: v1-console-namespaces
      path: /v1/console/namespaces
      operations:
      - name: listnamespaces
        method: GET
        description: List namespaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createnamespace
        method: POST
        description: Create a namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updatenamespace
        method: PUT
        description: Update a namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletenamespace
        method: DELETE
        description: Delete a namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceId
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: accessToken
      value: '{{env.NACOS_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: open-namespace-rest
    port: 8080
    description: REST adapter for Nacos Open API — Namespace. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/console/namespaces
      name: v1-console-namespaces
      description: REST surface for v1-console-namespaces.
      operations:
      - method: GET
        name: listnamespaces
        description: List namespaces
        call: open-namespace.listnamespaces
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createnamespace
        description: Create a namespace
        call: open-namespace.createnamespace
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatenamespace
        description: Update a namespace
        call: open-namespace.updatenamespace
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletenamespace
        description: Delete a namespace
        call: open-namespace.deletenamespace
        with:
          namespaceId: rest.namespaceId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-namespace-mcp
    port: 9090
    transport: http
    description: MCP adapter for Nacos Open API — Namespace. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-namespaces
      description: List namespaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-namespace.listnamespaces
      outputParameters:
      - type: object
        mapping: $.
    - name: create-namespace
      description: Create a namespace
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: open-namespace.createnamespace
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-namespace
      description: Update a namespace
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: open-namespace.updatenamespace
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-namespace
      description: Delete a namespace
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: open-namespace.deletenamespace
      with:
        namespaceId: tools.namespaceId
      outputParameters:
      - type: object
        mapping: $.
